<!DOCTYPE html>
<html>
<head>
    <title>Select Seat</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f3f4f6;
            text-align: center;
        }

        .container {
            margin-top: 30px;
        }

        h2 {
            margin-bottom: 10px;
        }

        .bus-layout {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .seat {
            width: 70px;
            height: 70px;
            background: #e0e0e0;
            border-radius: 10px;
            line-height: 70px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .seat:hover {
            transform: scale(1.05);
        }

        .selected {
            background: #4CAF50;
            color: white;
        }

        .booked {
            background: #999;
            cursor: not-allowed;
        }

        .legend {
            margin-top: 20px;
            font-size: 14px;
        }

        .legend span {
            margin: 0 10px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #ff5858, #f857a6);
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Select Seat for {{ ride }}</h2>
    <p>Choose your preferred seat</p>

    <!-- SEAT GRID -->
    <div class="bus-layout">
        <div class="seat" onclick="selectSeat(this)">1</div>
        <div class="seat" onclick="selectSeat(this)">2</div>
        <div class="seat booked">3</div>
        <div class="seat" onclick="selectSeat(this)">4</div>

        <div class="seat" onclick="selectSeat(this)">5</div>
        <div class="seat booked">6</div>
        <div class="seat" onclick="selectSeat(this)">7</div>
        <div class="seat" onclick="selectSeat(this)">8</div>

        <div class="seat" onclick="selectSeat(this)">9</div>
        <div class="seat" onclick="selectSeat(this)">10</div>
        <div class="seat booked">11</div>
        <div class="seat" onclick="selectSeat(this)">12</div>
    </div>

    <!-- LEGEND -->
    <div class="legend">
        <span>⬜ Available</span>
        <span>🟩 Selected</span>
        <span>⬛ Booked</span>
    </div>

    <!-- BUTTON -->
    <button class="btn" onclick="confirmBooking()">Confirm Booking</button>
</div>

<script>
let selectedSeat = null;

function selectSeat(el){
    if(el.classList.contains("booked")) return;

    document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');

    selectedSeat = el.innerText;
}

function confirmBooking(){
    if(!selectedSeat){
        alert("Please select a seat!");
        return;
    }

    // go to booking page
    window.location.href = "/book?ride={{ ride }}&seat=" + selectedSeat;
}
</script>

</body>
</html>
